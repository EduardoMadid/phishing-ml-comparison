services:
  api:
    build: .
    image: phishing-ml-comparison:latest
    container_name: phishing-ml-comparison-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      start_period: 10s